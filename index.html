<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sổ Tay 3D - Hệ Thống Ổn Định</title>
</head>
<body style="background:#0f172a; color:white; font-family:sans-serif; padding:20px;">
    
    <h2>Hệ thống Sổ tay 3D</h2>
    <div id="status">Đang xác định vai trò...</div>
    
    <div id="editorTools" style="display:none; margin-top:20px; padding:20px; border:2px solid #10b981;">
        <h3>Công cụ chỉnh sửa (Dành cho Chủ phòng)</h3>
        <button>Thêm trang</button>
        <button>Xóa trang</button>
    </div>

    <script>
        // 1. Kiểm tra vai trò
        let isOwner = localStorage.getItem('is_owner') === 'true';

        // 2. Nếu là lần đầu tiên, tự nhận là Chủ phòng
        if (!localStorage.getItem('is_owner')) {
            localStorage.setItem('is_owner', 'true');
            isOwner = true;
        }

        // 3. Hiển thị UI theo quyền
        const statusDiv = document.getElementById("status");
        if (isOwner) {
            statusDiv.innerHTML = "<b>Quyền của bạn:</b> Chủ phòng (Có thể chỉnh sửa)";
            document.getElementById("editorTools").style.display = "block";
        } else {
            statusDiv.innerHTML = "<b>Quyền của bạn:</b> Khách (Chỉ được xem)";
        }
    </script>
</body>
</html>
