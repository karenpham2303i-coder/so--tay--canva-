<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sổ Tay 3D - Hệ Thống Cấp Quyền</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #475569; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title">Hệ thống phân quyền</h2>
        <div id="status">Đang tải...</div>
        <hr>
        <div id="controls" style="display:none;">
            <p>Nhập "Mã bí mật" để mở quyền chỉnh sửa:</p>
            <input type="password" id="passInput">
            <button onclick="checkPassword()">Xác nhận</button>
        </div>
    </div>

    <script>
        // 1. Chỉ chủ phòng mới biết mật khẩu này
        const SECRET_PASS = "123456"; 

        // 2. Kiểm tra trạng thái đã đăng nhập chưa
        if (localStorage.getItem('isAuthorized') === 'true') {
            document.getElementById("status").innerHTML = "<b>Quyền:</b> Bạn là CHỈNH SỬA VIÊN (Editor).";
        } else {
            document.getElementById("status").innerHTML = "<b>Quyền:</b> Bạn là NGƯỜI XEM (Viewer).";
            document.getElementById("controls").style.display = "block";
        }

        // 3. Hàm cấp quyền thủ công
        function checkPassword() {
            let p = document.getElementById("passInput").value;
            if (p === SECRET_PASS) {
                localStorage.setItem('isAuthorized', 'true');
                alert("Đã cấp quyền chỉnh sửa!");
                location.reload();
            } else {
                alert("Mã sai!");
            }
        }
    </script>
</body>
</html>
