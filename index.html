<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sổ Tay 3D - Hệ Thống Offline</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Hệ Thống Quản Lý Sổ Tay</h2>
        <div id="status">Đang khởi tạo...</div>
        <hr>
        <p>Để chia sẻ: Hãy copy link trên trình duyệt và gửi cho người khác.</p>
    </div>

    <script>
        // Tự tạo ID phòng
        const urlParams = new URLSearchParams(window.location.search);
        let room = urlParams.get('room');
        
        if (!room) {
            room = Math.floor(Math.random() * 1000000).toString();
            window.history.pushState({}, '', '?room=' + room);
        }

        // Kiểm tra xem trình duyệt có lưu quyền sở hữu phòng này không
        let isOwner = localStorage.getItem('owner_' + room) === 'true';

        // Nếu chưa có ai sở hữu phòng, thiết bị này là chủ phòng
        if (!localStorage.getItem('owner_' + room)) {
            localStorage.setItem('owner_' + room, 'true');
            isOwner = true;
        }

        document.getElementById('status').innerHTML = isOwner ? 
            "<b>Trạng thái:</b> Bạn là CHỦ PHÒNG (Toàn quyền chỉnh sửa)." : 
            "<b>Trạng thái:</b> Bạn là KHÁCH (Đang chờ chủ phòng cấp quyền).";

        // Logic duyệt quyền đơn giản: 
        // Vì không dùng mạng ngoài, bạn có thể dùng cách: 
        // "Ai cầm link phòng này coi như có quyền" (Nếu bạn chỉ dùng cho nhóm bạn thân)
        console.log("Phòng hoạt động tại:", room);
    </script>
</body>
</html>
