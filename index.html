<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Tay 3D - Hệ Thống Phân Quyền</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        /* ... Các style cũ giữ nguyên ... */
        /* THÊM/CẬP NHẬT STYLE CHO KHUNG DUYỆT */
        .owner-modal {
            position: fixed; bottom: 30px; right: 30px; background: #1e293b; 
            border: 2px solid var(--owner-color); padding: 20px; border-radius: 12px; 
            width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 9999; 
            display: none; flex-direction: column; gap: 12px;
        }
    </style>
</head>
<body>

<script>
    // ... (Giữ nguyên các biến khai báo cũ)

    function connectRealtime() {
        channel = ably.channels.get('sotay_3d_room_' + roomCode);

        // LẮNG NGHE YÊU CẦU TỪ KHÁCH
        channel.subscribe('permission_channel', (msg) => {
            let data = msg.data;

            // Nếu bạn là chủ phòng và nhận được yêu cầu
            if (myRole === 'owner' && data.type === 'request_access') {
                currentPendingGuest = data.clientId;
                
                // Hiển thị khung duyệt quyền
                const modal = document.getElementById("approvalModal");
                modal.style.display = "flex";
                document.getElementById("approvalModalText").innerText = 
                    `Thiết bị [${data.clientId}] muốn vào phòng. Bạn cho phép họ làm gì?`;
            }

            // Nếu bạn là khách và nhận được phản hồi duyệt
            if (data.type === 'grant_access' && data.targetId === myClientId) {
                myRole = data.role;
                applyPermissionUI(myRole === 'editor' || myRole === 'owner');
                document.getElementById("roleDisplay").innerText = "Đã được cấp quyền: " + myRole;
            }
        });

        // TỰ ĐỘNG GỬI YÊU CẦU KHI KHÁCH VÀO
        if (myRole === 'pending') {
            channel.publish('permission_channel', { 
                type: 'request_access', 
                clientId: myClientId 
            });
        }
    }

    // HÀM DUYỆT QUYỀN (CHỈ DÀNH CHO OWNER)
    function approveGuest(roleType) {
        if (currentPendingGuest) {
            // Gửi lệnh duyệt ngược lại cho khách
            channel.publish('permission_channel', { 
                type: 'grant_access', 
                targetId: currentPendingGuest, 
                role: roleType 
            });
            
            // Ẩn bảng thông báo
            document.getElementById("approvalModal").style.display = "none";
            currentPendingGuest = null;
        }
    }
</script>

<div class="owner-modal" id="approvalModal">
    <h4><i class="fa-solid fa-user-check"></i> Phê duyệt thành viên</h4>
    <p id="approvalModalText"></p>
    <div class="modal-actions">
        <button style="background: #10b981;" onclick="approveGuest('editor')">Cho Sửa</button>
        <button style="background: #3b82f6;" onclick="approveGuest('viewer')">Xem</button>
        <button style="background: #ef4444;" onclick="approveGuest('block')">Từ chối</button>
    </div>
</div>

</body>
</html>
