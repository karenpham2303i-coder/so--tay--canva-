<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Phân Quyền</title>
</head>
<body style="background-color: #0f172a; color: white; font-family: sans-serif; padding: 20px;">
    
    <h2 id="roomDisplay">Đang tải...</h2>
    <div id="roleDisplay">Đang xác định vai trò...</div>

    <script>
        // 1. Lấy mã phòng từ URL
        const urlParams = new URLSearchParams(window.location.search);
        let roomCode = urlParams.get('room');

        // 2. LOGIC PHÂN QUYỀN
        // Nếu có ?room=... trong link, nghĩa là bạn đang là khách vào phòng của người khác
        if (roomCode) {
            document.getElementById("roleDisplay").innerHTML = "<b>Bạn là Khách (Guest)</b>";
            document.getElementById("roomDisplay").innerText = "Phòng số: " + roomCode;
        } else {
            // Nếu không có ?room=..., bạn là người tạo phòng mới
            roomCode = Math.floor(100000 + Math.random() * 900000).toString();
            window.history.pushState({}, '', '?room=' + roomCode);
            
            document.getElementById("roleDisplay").innerHTML = "<b>Bạn là CHỦ PHÒNG (Owner)</b>";
            document.getElementById("roomDisplay").innerText = "Phòng mới của bạn: " + roomCode;
            
            // Lưu dấu vết vào máy bạn để xác nhận bạn là chủ
            localStorage.setItem('is_owner_of_' + roomCode, 'true');
        }
    </script>
</body>
</html>
