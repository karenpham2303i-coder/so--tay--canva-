<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Tay 3D - Phiên Bản Hoàn Thiện Không Lỗi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Comfortaa:wght@400;700&family=Dancing+Script:wght@700&family=Lobster&family=Montserrat:wght@400;700&family=Noto+Sans+VN:wght@400;700&family=Pacifico&family=Playfair+Display:ital,wght@0,700;1,400&family=Caveat:wght@700&family=Patrick+Hand&family=Amatic+SC:wght@700&family=Quicksand:wght@500;700&family=Bungee&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-width: 380px;
            --primary: #6366f1;
        }
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0; font-family: 'Noto Sans VN', sans-serif;
            background-color: #0f172a; display: flex; height: 100vh; overflow: hidden; color: #f1f5f9;
        }

        /* SIDEBAR ĐIỀU KHIỂN CANVA */
        .sidebar {
            width: var(--sidebar-width); background: #1e293b; border-right: 1px solid #334155;
            display: flex; flex-direction: column; padding: 20px; gap: 12px; overflow-y: auto; z-index: 110;
        }
        h2 { margin: 0; color: #ffffff; font-size: 18px; display: flex; align-items: center; gap: 10px;}
        .section { background: #334155; padding: 12px; border-radius: 8px; border: 1px solid #475569; }
        .label { font-size: 11px; font-weight: bold; color: #cbd5e1; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .btn {
            background: var(--primary); color: white; border: none; padding: 10px;
            border-radius: 6px; cursor: pointer; font-weight: bold; display: flex;
            align-items: center; justify-content: center; gap: 8px; width: 100%; margin-bottom: 5px; transition: 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #10b981; }
        .btn-danger { background: #ef4444; }
        .btn-warning { background: #f59e0b; }

        input, select, textarea {
            width: 100%; padding: 8px 12px; border: 1px solid #475569; background: #1e293b;
            color: white; border-radius: 6px; box-sizing: border-box; font-size: 13px; margin-bottom: 5px;
        }

        .icon-search-box { display: flex; gap: 5px; margin-bottom: 8px; }
        .flaticon-hint { font-size: 11px; color: #94a3b8; margin-top: 4px; display: block; line-height: 1.3; }
        .flaticon-link { color: #38bdf8; text-decoration: none; font-weight: bold; }

        .asset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .asset-item {
            background: #1e293b; border: 1px solid #475569; border-radius: 6px;
            padding: 8px; text-align: center; cursor: pointer; font-size: 20px; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .asset-item:hover { transform: scale(1.15); border-color: var(--primary); background: #334155; }

        /* KHÔNG GIAN BÀN THIẾT KẾ 3D PERSPECTIVE */
        .workspace { 
            flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; padding: 20px; background: radial-gradient(circle, #243249 0%, #0f172a 100%);
        }
        
        .page-navigation { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; z-index: 120; }
        .page-indicator { font-size: 14px; font-weight: bold; color: #cbd5e1; background: #1e293b; padding: 6px 16px; border-radius: 20px; border: 1px solid #334155; }

        /* KHUNG SÁCH LẬT 3D */
        .book-container { width: 960px; height: 580px; position: relative; perspective: 2200px; }
        .book-spine {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 10px;
            background: linear-gradient(to right, rgba(0,0,0,0.45) 0%, rgba(255,255,255,0.15) 50%, rgba(0,0,0,0.45) 100%);
            z-index: 100; transform: translateX(-50%); box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }

        /* LỚP SHEET GIẤY LẬT ĐỘNG (0.75s) */
        .book-page-sheet {
            position: absolute; width: 50%; height: 100%; top: 0; transform-style: preserve-3d;
            transition: transform 0.75s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); z-index: 5; background: transparent;
        }
        .book-page-sheet.left-side { left: 0; transform-origin: right center; border-radius: 12px 2px 2px 12px; }
        .book-page-sheet.right-side { left: 50%; transform-origin: left center; border-radius: 2px 12px 12px 2px; }

        .page-face {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; backface-visibility: hidden;
            padding: 45px; overflow: hidden; transition: background-color 0.3s, opacity 0.3s;
        }

        /* Đổ bóng gờ giấy */
        .left-side .page-face { border-radius: 12px 2px 2px 12px; box-shadow: inset -15px 0 20px rgba(0,0,0,0.05); }
        .right-side .page-face { border-radius: 2px 12px 12px 2px; box-shadow: inset 15px 0 20px rgba(0,0,0,0.05); }

        /* THÀNH PHẦN KÉO THẢ */
        .element { position: absolute; cursor: move; padding: 5px; border: 1px dashed transparent; }
        .element.selected { border: 2px solid var(--primary); background: rgba(99, 102, 241, 0.04); z-index: 999; }
        .element .delete-btn {
            position: absolute; top: -12px; right: -12px; background: #ef4444; color: white;
            border-radius: 50%; width: 22px; height: 22px; font-size: 11px; display: none;
            align-items: center; justify-content: center; cursor: pointer; z-index: 1000;
        }
        .element.selected .delete-btn { display: flex; }

        .element-text { font-size: 18px; outline: none; word-break: break-word; user-select: text; min-width: 60px; line-height: 1.4; color: inherit; }
        .element-img { width: 140px; height: auto; pointer-events: none; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: block; }
        .element-icon { font-size: 48px; line-height: 1; }

        .room-bar {
            position: absolute; top: 20px; left: 20px; background: #1e293b; padding: 10px 15px;
            border-radius: 6px; display: flex; flex-direction: column; gap: 3px; border: 1px solid #334155; font-size: 13px; z-index: 200;
        }
        .page-num { position: absolute; bottom: 15px; font-size: 12px; color: #64748b; font-weight: bold; }
        .left-side .page-num { left: 20px; } .right-side .page-num { right: 20px; }
        .cover-style { color: #ffffff !important; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .invisible-sheet { opacity: 0 !important; pointer-events: none !important; box-shadow: none !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fa-solid fa-book-open" style="color:var(--primary)"></i> Sổ Tay 3D Toàn Quyền</h2>
        
        <div class="section" style="background: #10b981; border-color: #059669;">
            <span class="label" style="color: white;"><i class="fa-solid fa-unlock-keyhole"></i> Chế độ chia sẻ:</span>
            <div style="font-weight: bold; color: white;"><i class="fa-solid fa-earth-asia"></i> Ai có link cũng sửa được</div>
        </div>

        <div class="section" id="coverConfigSection" style="background: #2e1065; border-color: #6b21a8;">
            <span class="label" style="color:#d8b4fe;"><i class="fa-solid fa-star"></i> Thiết kế trang bìa:</span>
            <input type="text" id="coverTitleField" placeholder="Nhập tên sổ tay..." oninput="updateCoverData()">
            <input type="color" id="coverColorField" oninput="updateCoverData()">
        </div>

        <div class="section">
            <span class="label">Quản lý trang nội dung:</span>
            <button class="btn btn-secondary" onclick="addPagePair()"><i class="fa-solid fa-plus"></i> Chèn 2 Trang Mới</button>
            <button class="btn btn-danger" id="deleteBtn" onclick="deleteSelectedPagePair()"><i class="fa-solid fa-trash"></i> Xóa cặp trang này</button>
        </div>

        <div class="section">
            <span class="label">Thêm nội dung:</span>
            <button class="btn" onclick="addNewElement('text', 'Nhấp đúp viết chữ...')"><i class="fa-solid fa-font"></i> Chèn Khung Chữ</button>
        </div>

        <div class="section">
            <span class="label"><i class="fa-solid fa-images"></i> Chèn hình ảnh thông minh:</span>
            <button class="btn btn-secondary" onclick="document.getElementById('fileImageLoader').click()"><i class="fa-solid fa-file-arrow-up"></i> Tải ảnh lên từ máy</button>
            <input type="file" id="fileImageLoader" accept="image/*" style="display: none;" onchange="uploadLocalImage(event)">
            <span class="flaticon-hint">💡 <b>Mẹo:</b> Nhấn <b>Ctrl + V</b> tại đây để dán trực tiếp hình chụp màn hình!</span>
        </div>

        <div class="section">
            <span class="label"><i class="fa-solid fa-icons"></i> Thư viện biểu tượng trang trí:</span>
            <div class="icon-search-box">
                <input type="text" id="iconSearchInput" placeholder="Tìm kiếm icon (Ví dụ: heart, star...)" onkeyup="filterIcons()">
            </div>
            <div class="asset-grid" id="iconLibraryGrid">
                <div class="asset-item" title="Star" onclick="addNewElement('icon', 'fa-solid fa-star')"><i class="fa-solid fa-star"></i></div>
                <div class="asset-item" title="Heart" onclick="addNewElement('icon', 'fa-solid fa-heart')"><i class="fa-solid fa-heart"></i></div>
                <div class="asset-item" title="Crown" onclick="addNewElement('icon', 'fa-solid fa-crown')"><i class="fa-solid fa-crown"></i></div>
                <div class="asset-item" title="Fire" onclick="addNewElement('icon', 'fa-solid fa-fire')"><i class="fa-solid fa-fire"></i></div>
                <div class="asset-item" title="Thunder" onclick="addNewElement('icon', 'fa-solid fa-bolt')"><i class="fa-solid fa-bolt"></i></div>
                <div class="asset-item" title="Gift" onclick="addNewElement('icon', 'fa-solid fa-gift')"><i class="fa-solid fa-gift"></i></div>
                <div class="asset-item" title="Cat" onclick="addNewElement('icon', 'fa-solid fa-cat')"><i class="fa-solid fa-cat"></i></div>
                <div class="asset-item" title="Coffee" onclick="addNewElement('icon', 'fa-solid fa-mug-hot')"><i class="fa-solid fa-mug-hot"></i></div>
            </div>
        </div>

        <div class="section" id="editorPanel" style="background: #475569;">
            <span class="label" style="color:#67e8f9;"><i class="fa-solid fa-sliders"></i> Tùy chỉnh đối tượng:</span>
            <select id="fontFamilySelector" onchange="applyFont(this.value)">
                <option value="'Noto Sans VN'">Noto Sans (Mặc định)</option>
                <option value="'Montserrat'">Montserrat</option>
                <option value="'Quicksand'">Quicksand dễ thương</option>
                <option value="'Dancing Script'">Dancing Script viết tay</option>
                <option value="'Caveat'">Caveat nét bút mực</option>
            </select>
            <div style="display:flex; gap: 5px; margin-top: 5px;">
                <button class="btn" style="background:#1e293b;" onclick="applySize(5)"><i class="fa-solid fa-plus"></i> To lên</button>
                <button class="btn" style="background:#1e293b;" onclick="applySize(-5)"><i class="fa-solid fa-minus"></i> Nhỏ đi</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
                <div>
                    <label class="label">Màu sắc:</label>
                    <input type="color" id="textColorPicker" oninput="applyColor(this.value)">
                </div>
                <div>
                    <label class="label">Nền trang:</label>
                    <input type="color" id="pageBgColorPicker" oninput="applyPageBg(this.value)">
                </div>
            </div>
        </div>
    </div>

    <div class="workspace">
        <div class="room-bar">
            <button class="btn btn-warning" onclick="downloadBookImage()"><i class="fa-solid fa-download"></i> XUẤT BẢN THÀNH ẢNH</button>
        </div>

        <div class="page-navigation">
            <button class="btn" style="width:90px; margin:0;" onclick="turnPage(-1)"><i class="fa-solid fa-chevron-left"></i> Trước</button>
            <div class="page-indicator" id="pageIndicator">Đang tải...</div>
            <button class="btn" style="width:90px; margin:0;" onclick="turnPage(1)">Sau <i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="book-container" id="bookContainer" onclick="clearSelection()">
            <div class="book-spine" id="bookSpine"></div>
            
            <div class="book-page-sheet left-side" id="sheetLeft">
                <div class="page-face" id="pLeftFront"></div>
            </div>

            <div class="book-page-sheet right-side" id="sheetRight">
                <div class="page-face" id="pRightFront"></div>
            </div>
        </div>
    </div>

    <script>
        let roomCode = '';
        let selectedId = null;

        let notebook = {
            currentPagePair: 0,
            pages: [
                { isBlankPlaceholder: true }, 
                { isCover: true, bg: "#311b92", title: "SỔ TAY CỦA TÔI", isFirstCover: true, elements: {} }, 
                { bg: "#fcfbf7", elements: {} }, 
                { bg: "#fcfbf7", elements: {} }, 
                { isCover: true, bg: "#1e293b", title: "TRANG KẾT", isLastCover: true, elements: {} },     
                { isBlankPlaceholder: true }  
            ]
        };

        const mockFlaticonDb = [
            "fa-star", "fa-heart", "fa-crown", "fa-fire", "fa-bolt", "fa-gift", "fa-cat", "fa-mug-hot"
        ];

        // Khởi tạo hệ thống lưu trữ đồng bộ mã phòng qua URL công khai
        function initAppConfig() {
            const urlParams = new URLSearchParams(window.location.search);
            roomCode = urlParams.get('room');
            
            if (!roomCode) {
                roomCode = Math.floor(100000 + Math.random() * 900000).toString();
                window.history.pushState({}, '', '?room=' + roomCode);
            }

            let savedData = localStorage.getItem('notebook_data_' + roomCode);
            if (savedData) {
                notebook = JSON.parse(savedData);
            }
            renderBook3D();
            setupPasteEvent();
        }

        function saveData() {
            localStorage.setItem('notebook_data_' + roomCode, JSON.stringify(notebook));
        }

        function renderBook3D() {
            let leftIdx = notebook.currentPagePair * 2;
            let rightIdx = leftIdx + 1;

            const sheetLeft = document.getElementById("sheetLeft");
            const sheetRight = document.getElementById("sheetRight");
            const bookSpine = document.getElementById("bookSpine");

            sheetLeft.classList.remove("invisible-sheet");
            sheetRight.classList.remove("invisible-sheet");
            bookSpine.style.opacity = "1";

            if (notebook.currentPagePair === 0) {
                sheetLeft.classList.add("invisible-sheet");
                bookSpine.style.opacity = "0"; 
            } else if (notebook.pages[leftIdx]?.isLastCover) {
                sheetRight.classList.add("invisible-sheet");
                bookSpine.style.opacity = "0"; 
            }

            fillFaceData("pLeftFront", leftIdx);
            fillFaceData("pRightFront", rightIdx);

            let activeCoverPage = notebook.pages[leftIdx]?.isCover ? notebook.pages[leftIdx] : (notebook.pages[rightIdx]?.isCover ? notebook.pages[rightIdx] : null);
            if (activeCoverPage) {
                document.getElementById("coverConfigSection").style.display = "block";
                document.getElementById("coverTitleField").value = activeCoverPage.title;
                document.getElementById("coverColorField").value = activeCoverPage.bg;
            } else {
                document.getElementById("coverConfigSection").style.display = "none";
            }

            let totalContentPages = notebook.pages.length - 4; 
            document.getElementById("pageIndicator").innerText = notebook.currentPagePair === 0 ? `Bìa Trước / ${totalContentPages} trang` : (notebook.pages[leftIdx]?.isLastCover ? `Bìa Sau / ${totalContentPages} trang` : `Trang ${leftIdx - 1} - ${rightIdx - 1} / ${totalContentPages}`);
        }

        function fillFaceData(faceId, pageIdx) {
            const faceNode = document.getElementById(faceId);
            faceNode.innerHTML = "";
            let page = notebook.pages[pageIdx];
            if (!page || page.isBlankPlaceholder) {
                faceNode.style.backgroundColor = "transparent";
                return;
            }

            faceNode.style.backgroundColor = page.bg;

            if (page.isCover) {
                faceNode.classList.add("cover-style");
                faceNode.innerHTML = `
                    <i class="fa-solid fa-bookmark" style="font-size:44px;color:#fde047;"></i>
                    <h1 style="margin:18px 0 6px 0; font-size:30px;">${page.title}</h1>
                    <p style="font-size:11px;opacity:0.5;margin:0;">${page.isFirstCover ? 'BÌA TRƯỚC' : 'BÌA SAU'}</p>
                `;
            } else {
                faceNode.classList.remove("cover-style");
                faceNode.innerHTML = `<div class="page-num">Trang ${pageIdx - 1}</div>`;
                Object.values(page.elements || {}).forEach(el => buildDomElement(el, faceNode, pageIdx));
            }
        }

        function buildDomElement(el, parentNode, pageIdx) {
            let div = document.createElement("div");
            div.className = "element";
            div.id = el.id;
            div.style.left = el.x + "px";
            div.style.top = el.y + "px";

            if (selectedId === el.id) div.classList.add("selected");

            let deleteBtn = document.createElement("div");
            deleteBtn.className = "delete-btn";
            deleteBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
            deleteBtn.onclick = (e) => { e.stopPropagation(); deleteElement(pageIdx, el.id); };
            div.appendChild(deleteBtn);

            if (el.type === 'text') {
                let textDiv = document.createElement("div");
                textDiv.className = "element-text";
                textDiv.contentEditable = true;
                textDiv.style.fontFamily = el.fontFamily || 'inherit';
                textDiv.style.fontSize = (el.size || 18) + "px";
                textDiv.style.color = el.color || '#000000';
                textDiv.innerText = el.content;
                textDiv.onblur = () => { el.content = textDiv.innerText; saveData(); };
                div.appendChild(textDiv);
            } else if (el.type === 'icon') {
                let icon = document.createElement("i");
                icon.className = `${el.content} element-icon`;
                icon.style.fontSize = (el.size || 48) + "px";
                icon.style.color = el.color || '#6366f1';
                div.appendChild(icon);
            } else if (el.type === 'image') {
                let img = document.createElement("img");
                img.className = "element-img";
                img.src = el.content;
                img.style.width = (el.size || 140) + "px";
                div.appendChild(img);
            }

            div.onmousedown = (e) => { e.stopPropagation(); selectElement(el.id); dragStart(e, el, pageIdx); };
            parentNode.appendChild(div);
        }

        function addNewElement(type, content) {
            let leftIdx = notebook.currentPagePair * 2;
            let targetPage = notebook.pages[leftIdx]?.isCover ? leftIdx : leftIdx + 1;
            if (notebook.pages[targetPage].isCover || notebook.pages[targetPage].isBlankPlaceholder) return;

            let id = 'el_' + Date.now();
            if (!notebook.pages[targetPage].elements) notebook.pages[targetPage].elements = {};
            
            notebook.pages[targetPage].elements[id] = {
                id: id, type: type, content: content, x: 50, y: 50, size: type === 'image' ? 140 : (type === 'icon' ? 48 : 18), color: type === 'text' ? '#000000' : '#6366f1', fontFamily: "'Noto Sans VN'"
            };
            selectedId = id;
            saveData();
            renderBook3D();
        }

        function dragStart(e, el, pageIdx) {
            let startX = e.clientX; let startY = e.clientY;
            let elemX = el.x; let elemY = el.y;
            
            function dragging(ev) {
                el.x = elemX + (ev.clientX - startX);
                el.y = elemY + (ev.clientY - startY);
                let node = document.getElementById(el.id);
                if (node) { node.style.left = el.x + "px"; node.style.top = el.y + "px"; }
            }
            function dragEnd() { window.removeEventListener('mousemove', dragging); window.removeEventListener('mouseup', dragEnd); saveData(); }
            window.addEventListener('mousemove', dragging);
            window.addEventListener('mouseup', dragEnd);
        }

        function selectElement(id) {
            selectedId = id;
            document.querySelectorAll(".element").forEach(node => node.classList.remove("selected"));
            let actNode = document.getElementById(id);
            if (actNode) actNode.classList.add("selected");
            document.getElementById("editorPanel").style.display = "block";
        }

        function clearSelection() {
            selectedId = null;
            document.querySelectorAll(".element").forEach(node => node.classList.remove("selected"));
            document.getElementById("editorPanel").style.display = "none";
        }

        function deleteElement(pageIdx, id) {
            delete notebook.pages[pageIdx].elements[id];
            clearSelection(); saveData(); renderBook3D();
        }

        function turnPage(dir) {
            let nextPair = notebook.currentPagePair + dir;
            if (nextPair >= 0 && nextPair * 2 < notebook.pages.length) {
                notebook.currentPagePair = nextPair;
                renderBook3D();
            }
        }

        function addPagePair() {
            let insIdx = notebook.pages.length - 2;
            notebook.pages.splice(insIdx, 0, { bg: "#fcfbf7", elements: {} }, { bg: "#fcfbf7", elements: {} });
            saveData(); renderBook3D();
        }

        function deleteSelectedPagePair() {
            let leftIdx = notebook.currentPagePair * 2;
            if (notebook.pages[leftIdx].isCover || notebook.pages[leftIdx+1].isCover || notebook.pages.length <= 6) return;
            notebook.pages.splice(leftIdx, 2);
            notebook.currentPagePair = Math.max(0, notebook.currentPagePair - 1);
            saveData(); renderBook3D();
        }

        function updateCoverData() {
            let leftIdx = notebook.currentPagePair * 2;
            let rightIdx = leftIdx + 1;
            let title = document.getElementById("coverTitleField").value;
            let color = document.getElementById("coverColorField").value;

            if (notebook.pages[leftIdx]?.isCover) { notebook.pages[leftIdx].title = title; notebook.pages[leftIdx].bg = color; }
            else if (notebook.pages[rightIdx]?.isCover) { notebook.pages[rightIdx].title = title; notebook.pages[rightIdx].bg = color; }
            saveData(); renderBook3D();
        }

        function applyFont(font) { if (!selectedId) return; getActiveEl().fontFamily = font; saveData(); renderBook3D(); }
        function applySize(diff) { if (!selectedId) return; let el = getActiveEl(); el.size = (el.size || 18) + diff; saveData(); renderBook3D(); }
        function applyColor(hex) { if (!selectedId) return; getActiveEl().color = hex; saveData(); renderBook3D(); }
        function applyPageBg(hex) { let leftIdx = notebook.currentPagePair * 2; let target = notebook.pages[leftIdx].isCover ? leftIdx : leftIdx + 1; notebook.pages[target].bg = hex; saveData(); renderBook3D(); }
        
        function getActiveEl() {
            for (let p of notebook.pages) { if (p.elements && p.elements[selectedId]) return p.elements[selectedId]; }
            return null;
        }

        function uploadLocalImage(event) {
            let file = event.target.files[0]; if (!file) return;
            let reader = new FileReader();
            reader.onload = function(e) { addNewElement('image', e.target.result); }
            reader.readAsDataURL(file);
        }

        function setupPasteEvent() {
            window.addEventListener('paste', function(e) {
                let items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        let blob = items[i].getAsFile();
                        let reader = new FileReader();
                        reader.onload = function(event) { addNewElement('image', event.target.result); };
                        reader.readAsDataURL(blob);
                    }
                }
            });
        }

        function filterIcons() {
            let q = document.getElementById("iconSearchInput").value.toLowerCase();
            let grid = document.getElementById("iconLibraryGrid"); grid.innerHTML = "";
            mockFlaticonDb.forEach(iconClass => {
                if (iconClass.includes(q) || q === "") {
                    let div = document.createElement("div"); div.className = "asset-item"; div.innerHTML = `<i class="fa-solid ${iconClass}"></i>`;
                    div.onclick = () => addNewElement('icon', 'fa-solid ' + iconClass); grid.appendChild(div);
                }
            });
        }

        // CHỨC NĂNG XUẤT BẢN THÀNH ẢNH TOÀN DIỆN KHÔNG LỖI
        function downloadBookImage() {
            clearSelection();
            setTimeout(() => {
                const book = document.getElementById("bookContainer");
                html2canvas(book, { backgroundColor: null, useCORS: true, scale: 2 }).then(canvas => {
                    const link = document.createElement("a");
                    link.download = "so-tay-3d-premium.png";
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                });
            }, 100);
        }

        window.onload = initAppConfig;
    </script>
</body>
</html>
