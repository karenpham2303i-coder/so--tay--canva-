<script>
    // Lấy mã phòng từ URL
    const urlParams = new URLSearchParams(window.location.search);
    let roomCode = urlParams.get('room');
    
    // Tạo ID thiết bị ngẫu nhiên cho mỗi phiên làm việc
    let myDeviceId = localStorage.getItem('deviceId');
    if (!myDeviceId) {
        myDeviceId = 'User_' + Math.floor(Math.random() * 100000);
        localStorage.setItem('deviceId', myDeviceId);
    }

    const roleText = document.getElementById("roleStatus");

    // Nếu không có mã phòng -> Bạn là người tạo phòng (Chủ)
    if (!roomCode) {
        let newRoom = Math.floor(Math.random() * 1000000);
        roleText.innerHTML = "<b>Bạn là CHỦ PHÒNG</b><br><small>Gửi link này cho khách: " + window.location.href + "?room=" + newRoom + "</small>";
        // Lưu quyền sở hữu cho riêng thiết bị của bạn
        localStorage.setItem('owner_of_' + newRoom, 'true');
    } else {
        // Nếu có mã phòng -> Bạn là Khách (Trừ khi bạn có mã xác nhận của chủ)
        if (localStorage.getItem('owner_of_' + roomCode) === 'true') {
            roleText.innerHTML = "<b>Bạn là CHỦ PHÒNG (Đang quản lý phòng " + roomCode + ")</b>";
        } else {
            roleText.innerHTML = "<b>Bạn là KHÁCH (Phòng số: " + roomCode + ")</b>";
        }
    }
</script>
