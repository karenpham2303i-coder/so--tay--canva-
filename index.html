<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Duyệt Quyền</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        /* Modal được làm nổi bật hơn */
        #approvalModal { 
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: #1e293b; 
            padding: 40px; border: 4px solid #f59e0b; border-radius: 15px; 
            z-index: 99999; box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-align: center;
        }
    </style>
</head>
<body>
    <h2 id="roomDisplay">Đang tải...</h2>
    <div id="roleDisplay">Đang kết nối...</div>

    <div id="approvalModal">
        <h2 style="color:#f59e0b;">Có khách mới!</h2>
        <p id="guestIdText" style="font-size: 18px;"></p>
        <button onclick="approveGuest('editor')" style="padding:15px 30px; background:#10b981; border:none; color:white; cursor:pointer;">Cho Sửa</button>
        <button onclick="approveGuest('viewer')" style="padding:15px 30px; background:#3b82f6; border:none; color:white; cursor:pointer;">Chỉ xem</button>
    </div>

    <script>
        const ably = new Ably.Realtime('h3sO_g.W8vN2A:vLbe_Z6u1ZfscwM-N-iO7R7mS4X8g17oNOnK7952jXw');
        const urlParams = new URLSearchParams(window.location.search);
        let roomCode = urlParams.get('room');
        let myClientId = 'Guest_' + Math.floor(Math.random() * 1000);
        let currentGuest = null;

        // Xử lý vai trò
        let isOwner = localStorage.getItem('is_owner_' + roomCode) === 'true';
        if (!roomCode) {
            roomCode = Math.floor(100000 + Math.random() * 900000).toString();
            isOwner = true;
            localStorage.setItem('is_owner_' + roomCode, 'true');
            window.history.pushState({}, '', '?room=' + roomCode);
        }

        const channel = ably.channels.get('room_' + roomCode);
        document.getElementById("roomDisplay").innerText = "Phòng: " + roomCode;
        document.getElementById("roleDisplay").innerHTML = isOwner ? "<b>Bạn là CHỦ PHÒNG</b>" : "<b>Bạn là Khách</b>";

        // Lắng nghe kết nối
        channel.subscribe('request_access', (msg) => {
            console.log("Nhận được yêu cầu từ:", msg.data.clientId); // Kiểm tra log bằng F12
            if (isOwner) {
                currentGuest = msg.data.clientId;
                document.getElementById("guestIdText").innerText = "Thiết bị: " + currentGuest;
                document.getElementById("approvalModal").style.display = "block";
            }
        });

        // Khách gửi yêu cầu sau khi kết nối xong
        ably.connection.on("connected", () => {
            if (!isOwner) {
                channel.publish('request_access', { clientId: myClientId });
            }
        });

        function approveGuest(role) {
            channel.publish('grant_access', { targetId: currentGuest, role: role });
            document.getElementById("approvalModal").style.display = "none";
        }
    </script>
</body>
</html>
