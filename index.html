<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Tay 3D - Phiên Bản Hoàn Thiện Không Lỗi</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Dancing+Script&family=Montserrat&family=Noto+Sans&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary-color: #8e44ad;
            --bg-color: #f5f6fa;
            --sidebar-width: 320px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar điều khiển */
        .sidebar {
            width: var(--sidebar-width);
            background: #ffffff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            background: var(--primary-color);
            color: white;
            text-align: center;
        }

        .section {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .btn:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #2ecc71; }
        .btn-success:hover { background: #27ae60; }

        .select-input, .color-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Thư viện sticker */
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .sticker-item {
            font-size: 24px;
            text-align: center;
            cursor: grab;
            padding: 5px;
            border: 1px solid #eee;
            border-radius: 4px;
            background: #f9f9f9;
        }

        .sticker-item:hover { background: #e1e1e1; }

        /* Vùng hiển thị sách 3D */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        .book-container {
            perspective: 1500px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 80%;
        }

        .book {
            position: relative;
            width: 700px;
            height: 450px;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            display: flex;
        }

        /* Trang sách */
        .page {
            width: 50%;
            height: 100%;
            background: white;
            position: relative;
            box-shadow: inset 3px 0 10px rgba(0,0,0,0.1), 5px 5px 15px rgba(0,0,0,0.1);
            padding: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .page-left {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            border-right: 2px dashed #ccc;
        }

        .page-right {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        /* Các phần tử kéo thả bên trong trang */
        .element-wrap {
            position: absolute;
            cursor: move;
            user-select: none;
            padding: 5px;
            border: 1px dashed transparent;
        }

        .element-wrap:hover, .element-wrap.active {
            border-color: #3498db;
        }

        .element-text {
            outline: none;
            min-width: 50px;
            word-wrap: break-word;
        }

        .element-img {
            max-width: 150px;
            max-height: 150px;
            object-fit: contain;
            pointer-events: none;
        }

        .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .element-wrap:hover .delete-btn {
            display: flex;
        }

        /* Điều hướng Trước / Sau */
        .nav-controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btn:hover { background: #34495e; }

        .page-number {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            color: #999;
        }
        .page-left .page-number { left: 20px; }
        .page-right .page-number { right: 20px; }

        .tip-box {
            font-size: 12px;
            color: #666;
            background: #fff3cd;
            padding: 8px;
            border-left: 3px solid #ffc107;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fa-solid fa-book-open"></i> Sổ Tay 3D Canva</h2>
        </div>

        <div class="section">
            <div class="section-title"><i class="fa-solid fa-share-nodes"></i> Chế độ chia sẻ</div>
            <select class="select-input">
                <option>Ai có link cũng sửa được</option>
                <option>Chỉ mình tôi</option>
            </select>
        </div>

        <div class="section">
            <div class="section-title"><i class="fa-solid fa-paste"></i> Quản lý trang nội dung</div>
            <button class="btn btn-success" onclick="addPagePair()"><i class="fa-solid fa-plus"></i> Chèn 2 Trang Mới</button>
            <button class="btn btn-danger" onclick="deleteCurrentPair()"><i class="fa-solid fa-trash"></i> Xóa cặp trang này</button>
        </div>

        <div class="section">
            <div class="section-title"><i class="fa-solid fa-font"></i> Thêm nội dung</div>
            <button class="btn" onclick="addTextBox()"><i class="fa-solid fa-paragraph"></i> Chèn Khung Chữ</button>
        </div>

        <div class="section">
            <div class="section-title"><i class="fa-solid fa-image"></i> Chèn hình ảnh thông minh</div>
            <input type="file" id="imageLoader" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
            <button class="btn" onclick="document.getElementById('imageLoader').click()"><i class="fa-solid fa-upload"></i> Tải ảnh lên từ máy</button>
            <div class="tip-box">
                💡 **Mẹo:** Nhấn **Ctrl + V** tại trang web này để dán trực tiếp hình chụp màn hình!
            </div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fa-solid fa-icons"></i> Thư viện biểu tượng</div>
            <div class="sticker-grid">
                <div class="sticker-item" draggable="true" ondragstart="dragSticker(event)">🌸</div>
                <div class="sticker-item" draggable="true" ondragstart="dragSticker(event)">⭐</div>
                <div class="sticker-item" draggable="true" ondragstart="dragSticker(event)">❤️</div>
                <div class="sticker-item" draggable="true" ondragstart="dragSticker(event)">🍀</div>
                <div class="sticker-item" draggable="true" ondragstart="dragSticker(event)">🐱</div>
                <div class="sticker-item" draggable="true" ondragstart="dragSticker(event)">🎉</div>
                <div class="sticker-item" draggable="true" ondragstart="dragSticker(event)">🎨</div>
                <div class="sticker-item" draggable="true" ondragstart="dragSticker(event)">✨</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fa-solid fa-sliders"></i> Tùy chỉnh đối tượng</div>
            <label>Phông chữ:</label>
            <select id="fontFamilySelect" class="select-input" onchange="changeFont()">
                <option value="'Noto Sans', sans-serif">Noto Sans (Mặc định)</option>
                <option value="'Montserrat', sans-serif">Montserrat</option>
                <option value="'Quicksand', sans-serif">Quicksand dễ thương</option>
                <option value="'Dancing Script', cursive">Dancing Script viết tay</option>
                <option value="'Caveat', cursive">Caveat nét bút mực</option>
            </select>

            <label>Kích thước:</label>
            <div style="display:flex; gap:5px;">
                <button class="btn" onclick="changeSize(2)" style="margin-bottom:0;"><i class="fa-solid fa-plus"></i> To lên</button>
                <button class="btn" onclick="changeSize(-2)" style="margin-bottom:0;"><i class="fa-solid fa-minus"></i> Nhỏ đi</button>
            </div>

            <label style="margin-top:10px; display:block;">Màu sắc chữ:</label>
            <input type="color" id="textColorInput" class="color-input" value="#000000" onchange="changeColor()">

            <label>Nền trang sách:</label>
            <input type="color" id="pageBgInput" class="color-input" value="#ffffff" onchange="changePageBg()">
        </div>

        <div class="section">
            <button class="btn btn-success" style="background:#8e44ad;" onclick="exportToImage()"><i class="fa-solid fa-file-image"></i> XUẤT BẢN THÀNH ẢNH</button>
        </div>
    </div>

    <div class="main-content" id="dropZone" ondragover="allowDrop(event)" ondrop="dropStickerToPage(event)">
        <div class="book-container">
            <div class="book" id="bookCanvas">
                <div class="page page-left" id="leftPage">
                    <div class="page-number" id="leftPageNum">Trang 1</div>
                </div>
                <div class="page page-right" id="rightPage">
                    <div class="page-number" id="rightPageNum">Trang 2</div>
                </div>
            </div>
        </div>

        <div class="nav-controls">
            <button class="nav-btn" onclick="prevPage()"><i class="fa-solid fa-chevron-left"></i> Trước</button>
            <span id="pageDisplayStatus" style="line-height:40px; font-weight:bold;">Đang xem tập 1-2</span>
            <button class="nav-btn" onclick="nextPage()">Sau <i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>

    <script>
        // Quản lý dữ liệu các trang sách
        let currentPagePair = 0; // Cặp trang hiện tại (0 nghĩa là trang 1-2, 1 là trang 3-4...)
        let bookData = [
            { leftHtml: '', rightHtml: '', leftBg: '#ffffff', rightBg: '#ffffff' }
        ];

        let selectedElement = null;
        let activeDragStickerText = '';

        // Khởi tạo trang ban đầu
        function initBook() {
            renderPages();
        }

        // Render dữ liệu lên 2 trang hiện tại
        function renderPages() {
            const currentData = bookData[currentPagePair];
            
            // Lưu lại dữ liệu cũ trước khi render trang mới (nếu có phần tử)
            saveCurrentPageData();

            // Thiết lập số trang
            document.getElementById('leftPageNum').innerText = `Trang ${currentPagePair * 2 + 1}`;
            document.getElementById('rightPageNum').innerText = `Trang ${currentPagePair * 2 + 2}`;
            document.getElementById('pageDisplayStatus').innerText = `Đang xem trang ${currentPagePair * 2 + 1} - ${currentPagePair * 2 + 2}`;

            // Phục hồi HTML và màu nền
            const leftPage = document.getElementById('leftPage');
            const rightPage = document.getElementById('rightPage');

            // Xóa sạch các element cũ trừ số trang
            clearPageElements(leftPage);
            clearPageElements(rightPage);

            leftPage.style.backgroundColor = bookData[currentPagePair].leftBg || '#ffffff';
            rightPage.style.backgroundColor = bookData[currentPagePair].rightBg || '#ffffff';

            // Chèn lại các element đã lưu
            if(bookData[currentPagePair].leftHtml) {
                leftPage.insertAdjacentHTML('beforeend', bookData[currentPagePair].leftHtml);
            }
            if(bookData[currentPagePair].rightHtml) {
                rightPage.insertAdjacentHTML('beforeend', bookData[currentPagePair].rightHtml);
            }

            makeElementsInteractive();
        }

        function clearPageElements(pageNode) {
            const elements = pageNode.querySelectorAll('.element-wrap');
            elements.forEach(el => el.remove());
        }

        function saveCurrentPageData() {
            // Sao lưu cấu trúc HTML hiện tại của cặp trang vào mảng tạm
            const leftPage = document.getElementById('leftPage').cloneNode(true);
            const rightPage = document.getElementById('rightPage').cloneNode(true);
            
            clearPageElements(leftPage); // Chỉ lấy phần lưu trữ sạch
            
            // Quét và nạp lại HTML hiện tại của các node element
            bookData[currentPagePair].leftHtml = Array.from(document.getElementById('leftPage').querySelectorAll('.element-wrap')).map(el => el.outerHTML).join('');
            bookData[currentPagePair].rightHtml = Array.from(document.getElementById('rightPage').querySelectorAll('.element-wrap')).map(el => el.outerHTML).join('');
        }

        // Thêm cặp trang mới
        function addPagePair() {
            saveCurrentPageData();
            bookData.push({ leftHtml: '', rightHtml: '', leftBg: '#ffffff', rightBg: '#ffffff' });
            currentPagePair = bookData.length - 1;
            renderPages();
        }

        // Xóa cặp trang hiện tại
        function deleteCurrentPair() {
            if(bookData.length === 1) {
                alert("Không thể xóa cặp trang duy nhất còn lại!");
                return;
            }
            bookData.splice(currentPagePair, 1);
            if(currentPagePair > 0) currentPagePair--;
            renderPages();
        }

        function nextPage() {
            if(currentPagePair < bookData.length - 1) {
                saveCurrentPageData();
                currentPagePair++;
                renderPages();
            }
        }

        function prevPage() {
            if(currentPagePair > 0) {
                saveCurrentPageData();
                currentPagePair--;
                renderPages();
            }
        }

        // Tạo phần tử Khung Chữ độc lập kéo thả
        function addTextBox() {
            const wrap = document.createElement('div');
            wrap.className = 'element-wrap';
            wrap.style.left = '50px';
            wrap.style.top = '100px';
            wrap.innerHTML = `<div class="element-text" contenteditable="true">Nhấp đúp để nhập chữ...</div><div class="delete-btn" onclick="this.parentElement.remove()">X</div>`;
            
            document.getElementById('leftPage').appendChild(wrap);
            makeElementsInteractive();
        }

        // Kéo thả biểu tượng (Sticker)
        function dragSticker(e) {
            activeDragStickerText = e.target.innerText;
        }

        function allowDrop(e) { e.preventDefault(); }

        function dropStickerToPage(e) {
            e.preventDefault();
            const targetPage = e.target.closest('.page');
            if (!targetPage) return;

            const rect = targetPage.getBoundingClientRect();
            const x = e.clientX - rect.left - 15;
            const y = e.clientY - rect.top - 15;

            const wrap = document.createElement('div');
            wrap.className = 'element-wrap';
            wrap.style.left = x + 'px';
            wrap.style.top = y + 'px';
            wrap.innerHTML = `<div class="element-text" style="font-size:32px;">${activeDragStickerText}</div><div class="delete-btn" onclick="this.parentElement.remove()">X</div>`;
            
            targetPage.appendChild(wrap);
            makeElementsInteractive();
        }

        // Đọc ảnh tải lên
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    insertImageToPage(event.target.result);
                }
                reader.readAsDataURL(file);
            }
        }

        // Lắng nghe sự kiện Ctrl + V để dán ảnh thông minh
        window.addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file') {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        insertImageToPage(event.target.result);
                    };
                    reader.readAsDataURL(blob);
                }
            }
        });

        function insertImageToPage(src) {
            const wrap = document.createElement('div');
            wrap.className = 'element-wrap';
            wrap.style.left = '40px';
            wrap.style.top = '40px';
            wrap.innerHTML = `<img src="${src}" class="element-img"><div class="delete-btn" onclick="this.parentElement.remove()">X</div>`;
            document.getElementById('leftPage').appendChild(wrap);
            makeElementsInteractive();
        }

        // Xử lý kéo thả di chuyển linh hoạt cho mọi Object trong trang
        function makeElementsInteractive() {
            const elements = document.querySelectorAll('.element-wrap');
            elements.forEach(el => {
                el.addEventListener('mousedown', function(e) {
                    if (e.target.classList.contains('delete-btn') || e.target.getAttribute('contenteditable') === 'true') return;
                    
                    selectedElement = el;
                    // Bỏ chọn tất cả các element khác
                    elements.forEach(item => item.classList.remove('active'));
                    el.classList.add('active');

                    let shiftX = e.clientX - el.getBoundingClientRect().left;
                    let shiftY = e.clientY - el.getBoundingClientRect().top;

                    function moveAt(pageX, pageY) {
                        const parentPage = el.parentElement;
                        const pRect = parentPage.getBoundingClientRect();
                        let leftPos = pageX - pRect.left - shiftX;
                        let topPos = pageY - pRect.top - shiftY;
                        
                        el.style.left = leftPos + 'px';
                        el.style.top = topPos + 'px';
                    }

                    function onMouseMove(e) {
                        moveAt(e.clientX, e.clientY);
                    }

                    document.addEventListener('mousemove', onMouseMove);

                    document.onmouseup = function() {
                        document.removeEventListener('mousemove', onMouseMove);
                        document.onmouseup = null;
                    };
                });

                // Ngăn chặn hành vi kéo mặc định của trình duyệt lên hình ảnh
                el.ondragstart = function() { return false; };
            });
        }

        // Tùy chỉnh thuộc tính Text/Bìa cứng
        function changeFont() {
            if(selectedElement) {
                const textNode = selectedElement.querySelector('.element-text');
                if(textNode) textNode.style.fontFamily = document.getElementById('fontFamilySelect').value;
            }
        }

        function changeSize(amount) {
            if(selectedElement) {
                const textNode = selectedElement.querySelector('.element-text');
                if(textNode) {
                    let currentSize = parseInt(window.getComputedStyle(textNode).fontSize) || 16;
                    textNode.style.fontSize = (currentSize + amount) + 'px';
                }
            }
        }

        function changeColor() {
            if(selectedElement) {
                const textNode = selectedElement.querySelector('.element-text');
                if(textNode) textNode.style.color = document.getElementById('textColorInput').value;
            }
        }

        function changePageBg() {
            const color = document.getElementById('pageBgInput').value;
            document.getElementById('leftPage').style.backgroundColor = color;
            document.getElementById('rightPage').style.backgroundColor = color;
            bookData[currentPagePair].leftBg = color;
            bookData[currentPagePair].rightBg = color;
        }

        // Chức năng Xuất bản thành ảnh bằng thư viện html2canvas
        function exportToImage() {
            saveCurrentPageData();
            // Ẩn tạm thời các nút xóa "X" để ảnh xuất ra đẹp mắt
            const deleteButtons = document.querySelectorAll('.delete-btn');
            deleteButtons.forEach(btn => btn.style.display = 'none');

            const bookCanvas = document.getElementById('bookCanvas');
            html2canvas(bookCanvas, { useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = `so-tay-3d-trang-${currentPagePair*2+1}-${currentPagePair*2+2}.png`;
                link.href = canvas.toDataURL();
                link.click();
                
                // Khôi phục lại trạng thái nút xóa
                deleteButtons.forEach(btn => btn.style.removeAttribute);
            });
        }

        // Chạy ứng dụng khi mở trang web
        window.onload = initBook;
    </script>
</body>
</html>
