<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Phân Quyền</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .modal { display: none; position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); 
                 background: #1e293b; padding: 30px; border: 3px solid #f59e0b; border-radius: 12px; z-index: 9999; text-align: center; }
    </style>
</head>
<body>
    <h2 id="roomDisplay">Đang tải...</h2>
    <div id="roleDisplay">Đang xác định vai trò...</div>

    <div id="approvalModal" class="modal">
        <h3 style="color:#f59e0b;">Yêu cầu vào phòng!</h3>
        <p id="guestIdText" style="font-size: 16px;"></p>
        <div style="display:flex; gap:10px; justify-content: center;">
            <button onclick="approveGuest('editor')" style="padding:10px 20px; background: #10b981; border:none; color:white; cursor:pointer;">Cho Sửa</button>
            <button onclick="approveGuest('viewer')" style="padding:10px 20px; background: #3b82f6; border:none; color:white; cursor:pointer;">Chỉ xem</button>
        </div>
    </div>

    <script>
        const ably = new Ably.Realtime('h3sO_g.W8vN2A:vLbe_Z6u1ZfscwM-N-iO7R7mS4X8g17oNOnK7952jXw');
        const urlParams = new URLSearchParams(window.location.search);
        let roomCode = urlParams.get('room');
        let myClientId = 'User_' + Math.floor(Math.random() * 1000);
        let currentGuest = null;

        // 1. Logic phân quyền (đã xác nhận chạy ổn)
        let isOwner = localStorage.getItem('is_owner_' + roomCode) === 'true';
        if (!roomCode) {
            roomCode = Math.floor(100000 + Math.random() * 900000).toString();
            isOwner = true;
            localStorage.setItem('is_owner_' + roomCode, 'true');
            window.history.pushState({}, '', '?room=' + roomCode);
        }

        const channel = ably.channels.get('room_' + roomCode);
        document.getElementById("roomDisplay").innerText = "Phòng số: " + roomCode;
        document.getElementById("roleDisplay").innerHTML = isOwner ? "<b>Bạn là CHỦ PHÒNG</b>" : "<b>Bạn là Khách</b>";

        // 2. Khách xin vào
        if (!isOwner) {
            channel.publish('request_access', { clientId: myClientId });
        }

        // 3. Chủ phòng lắng nghe (Bổ sung kiểm tra kết nối)
        channel.subscribe('request_access', (msg) => {
            if (isOwner) {
                currentGuest = msg.data.clientId;
                document.getElementById("guestIdText").innerText = "Khách: " + currentGuest;
                document.getElementById("approvalModal").style.display = "block";
            }
        });

        // 4. Hàm Duyệt
        function approveGuest(role) {
            channel.publish('grant_access', { targetId: currentGuest, role: role });
            document.getElementById("approvalModal").style.display = "none";
            alert("Đã cấp quyền " + role + " cho " + currentGuest);
        }
    </script>
</body>
</html>
